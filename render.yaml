# Render.com Blueprint — deploys all 10 APIs as Web Services
# One-click deploy: https://render.com/deploy?repo=https://github.com/GabrielCorreia2005/FreelanceBusiness

services:
  - type: web
    name: sentiment-analysis-api
    runtime: node
    rootDir: apis/sentiment-analysis-api
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: API_KEY
        value: gc-api-key-2026-secure
      - key: PORT
        value: 3000
    plan: free

