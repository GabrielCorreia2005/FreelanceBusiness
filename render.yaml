# Render.com Blueprint — deploys 7 APIs as Web Services
# Usage: Go to https://render.com/deploy → New Blueprint → connect GitHub repo
# Render automatically reads this file from repo root
# One-click: https://render.com/deploy?repo=https://github.com/GabrielCorreiaAI/FreelanceBusiness

services:
  - type: web
    name: sentiment-analysis-api
    runtime: node
    rootDir: apis/sentiment-analysis-api
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: API_KEY
        value: gc-api-key-2026-secure
      - key: PORT
        value: 3000
    plan: free

